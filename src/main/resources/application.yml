server:
  port: 9096
  address: 0.0.0.0
  

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-origin-patterns: [] # 需要时可填如 http://localhost:*
    allowed-methods:
      - '*'
    allowed-headers:
      - '*'
    allow-credentials: true
    max-age: 3600

